<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Deposit Successful | LomaShares</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <div class="brand">LOMASHARES</div>
  </header>

  <main class="container">
    <div class="card">
      <h2 style="margin:0;font-weight:1000">Confirming Deposit…</h2>
      <p class="note" id="msg">Please wait while we verify your payment.</p>

      <div style="margin-top:12px;padding:14px;border-radius:18px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08)">
        <div style="font-size:12px;font-weight:1000;color:rgba(234,242,255,.85);letter-spacing:.8px">REFERENCE</div>
        <div id="ref" style="margin-top:6px;font-weight:1000;word-break:break-all">—</div>
      </div>

      <button class="btn" id="goDash" type="button" style="display:none">Go to Dashboard</button>
      <button class="btnOutline" id="retry" type="button" style="display:none">Retry Verification</button>
    </div>
  </main>

  <script>
    function getRef() {
      const url = new URL(window.location.href);
      return url.searchParams.get("reference") || url.searchParams.get("ref") || "";
    }

    async function verify() {
      const reference = getRef();
      document.getElementById("ref").textContent = reference || "—";

      const msg = document.getElementById("msg");
      const goDash = document.getElementById("goDash");
      const retry = document.getElementById("retry");

      if (!reference) {
        msg.textContent = "No reference found. Please contact support.";
        retry.style.display = "block";
        return;
      }

      msg.textContent = "Verifying payment with Paystack…";

      try {
        const r = await fetch("/api/deposit-verify?reference=" + encodeURIComponent(reference));
        const data = await r.json();

        if (!r.ok || data.error) throw new Error(data.error || "Verification failed");

        msg.textContent = `Deposit verified ✅ ₦${Number(data.amount).toLocaleString()} credited to your wallet.`;
        goDash.style.display = "block";
      } catch (e) {
        msg.textContent = "Verification failed: " + e.message;
        retry.style.display = "block";
      }
    }

    document.getElementById("goDash").addEventListener("click", () => {
      window.location.href = "dashboard.html";
    });
    document.getElementById("retry").addEventListener("click", verify);

    verify();
  </script>
</body>
  </html>
