<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Deposit Successful</title>
</head>
<body style="font-family:Arial;padding:20px">

<h2>Verifying your payment...</h2>

<script>
  const params = new URLSearchParams(window.location.search);
  const reference = params.get("reference");

  async function verifyPayment() {
    if (!reference) {
      document.body.innerHTML = "<h3>No reference found</h3>";
      return;
    }

    const res = await fetch("/api/deposit-verify", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ reference })
    });

    const data = await res.json();

    if (data.error) {
      document.body.innerHTML = "<h3>Verification failed</h3><p>" + data.error + "</p>";
      return;
    }

    document.body.innerHTML = `
      <h2>Deposit Successful ✅</h2>
      <p>Your wallet has been credited.</p>
      <button onclick="location.href='dashboard.html'">Go to Dashboard</button>
    `;
  }

  verifyPayment();
</script>

</body>
</html>
