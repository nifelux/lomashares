<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | LomaShares</title>

  <script>
    window.__SUPABASE_URL__ = "YOUR_SUPABASE_URL_HERE";
    window.__SUPABASE_ANON_KEY__ = "YOUR_SUPABASE_ANON_KEY_HERE";
  </script>

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header"></header>

  <main class="container">
    <div class="card">
      <div style="display:flex;justify-content:center;margin-bottom:8px">
        <div style="width:84px;height:84px;border-radius:50%;display:flex;align-items:center;justify-content:center;
          background:radial-gradient(circle at 30% 30%, #1b6bff, #0b2a59 55%, #050b16 100%);
          border:3px solid rgba(247,213,106,.9); box-shadow:0 18px 45px rgba(27,107,255,.18);
          font-weight:1000;letter-spacing:2px;">LS</div>
      </div>

      <h2 style="margin:6px 0 6px;text-align:center;font-weight:1000">Welcome back</h2>
      <div class="note" style="text-align:center;margin-top:0">Login to manage your wallet and investments.</div>

      <div class="field"><div class="dot"></div><input id="email" type="email" placeholder="Email address"></div>
      <div class="field"><div class="dot"></div><input id="password" type="password" placeholder="Password"></div>

      <button class="btn" id="loginBtn" type="button">Login</button>
      <button class="btnOutline" type="button" onclick="location.href='register.html'">Create account</button>

      <div class="note">Deposits are credited after successful Paystack verification.</div>
    </div>
  </main>

  <script type="module">
    import { guard, doLogin } from "./auth.js";
    import { mountHeader } from "./ui.js";

    // PUBLIC guard: if logged in -> dashboard
    window.addEventListener("load", () => guard({ isPublicPage: true }));

    mountHeader({
      menuLinks: [
        { href:"index.html", label:"Login", icon:"home" },
        { href:"register.html", label:"Register", icon:"profile" },
        { href:"#", label:"About", icon:"team" }
      ]
    });

    document.getElementById("loginBtn").addEventListener("click", async () => {
      const email = document.getElementById("email").value.trim().toLowerCase();
      const password = document.getElementById("password").value.trim();
      if (!email || !password) return alert("Enter email and password");
      try { await doLogin(email, password); }
      catch(e){ alert(e.message); }
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter") document.getElementById("loginBtn").click();
    });
  </script>
</body>
</html>
