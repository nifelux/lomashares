<body>
  <header class="header"></header>

  <main class="container">
    <div class="card">
      <h3 style="margin:0;font-weight:1000">Withdraw</h3>
      <div class="note">Minimum withdrawal: <b>₦500</b>. (Connect to your `/api/withdraw.js` later.)</div>

      <div class="field"><div class="dot"></div><input id="amount" inputmode="numeric" placeholder="Enter amount (₦)"></div>
      <button class="btn" id="wdBtn" type="button">Request Withdrawal</button>
      <div class="note" id="msg"></div>
    </div>
  </main>

  <footer class="footer"></footer>

  <script type="module">
    import { guard } from "./auth.js";
    import { mountHeader, mountFooter } from "./ui.js";

    window.addEventListener("load", () => guard({ isPublicPage:false }));

    mountHeader({
      menuLinks: [
        { href:"dashboard.html", label:"Dashboard", icon:"home" },
        { href:"withdraw.html", label:"Withdraw", icon:"withdraw" },
        { href:"profile.html", label:"Profile", icon:"profile" }
      ]
    });
    mountFooter("home");

    document.getElementById("wdBtn").addEventListener("click", ()=>{
      const amount = Number(String(document.getElementById("amount").value||"").replace(/[^0-9.]/g,""));
      if (!amount || amount < 500) return alert("Minimum withdrawal is ₦500");
      alert("Withdrawal request submitted. (Connect backend /api/withdraw.js next)");
    });
  </script>
</body>
