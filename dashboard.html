<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LOMASHARES Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* ------------------------------
       GENERAL STYLES
    ------------------------------- */
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      color: #000;
    }

    a { text-decoration: none; color: inherit; }

    /* ------------------------------
       STICKY HEADER
    ------------------------------- */
    header {
      position: sticky;
      top: 0;
      background: linear-gradient(to right, #0d47a1, #1976d2);
      color: #fff;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.8rem 1rem;
      z-index: 1000;
    }

    header h1 {
      margin: 0;
      font-size: 1.5rem;
      text-align: center;
      flex: 1;
    }

    .menu-icon {
      cursor: pointer;
      font-size: 1.5rem;
    }

    #dropdownMenu {
      position: absolute;
      top: 60px;
      left: 0;
      right: 0;
      background: #fff;
      color: #000;
      display: none;
      flex-direction: column;
      padding: 1rem;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }

    #dropdownMenu a {
      padding: 0.5rem 0;
      border-bottom: 1px solid #ddd;
    }

    /* ------------------------------
       DASHBOARD STATS
    ------------------------------- */
    .wallet-balance {
      margin: 1rem;
      font-size: 1.2rem;
      text-align: center;
    }

    /* ------------------------------
       INVESTMENT CARDS
    ------------------------------- */
    .investment-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1rem;
      padding: 1rem;
    }

    .investment-card {
      background: #fff;
      border-radius: 12px;
      padding: 1rem;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      text-align: center;
    }

    .investment-card h3 {
      margin: 0 0 0.5rem 0;
      color: #0d47a1;
    }

    .investment-card p {
      margin: 0.3rem 0;
      font-size: 0.9rem;
    }

    .investment-card input {
      width: 80%;
      margin: 0.5rem 0;
      padding: 0.3rem;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    .investment-card button {
      background-color: #1976d2;
      color: #fff;
      border: none;
      padding: 0.5rem 0.8rem;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .investment-card button:hover {
      background-color: #0d47a1;
    }

    /* ------------------------------
       MOBILE ADJUSTMENTS
    ------------------------------- */
    @media (max-width: 480px) {
      header h1 { font-size: 1.2rem; }
      .investment-card p { font-size: 0.8rem; }
    }
  </style>
</head>
<body>

  <!-- ===============================
       STICKY HEADER
  ================================ -->
  <header>
    <div class="menu-icon" onclick="toggleMenu()">&#9776;</div>
    <h1>LOMASHARES</h1>
  </header>

  <div id="dropdownMenu">
    <a href="index.html">Login</a>
    <a href="register.html">Register</a>
    <a href="#">About</a>
  </div>

  <!-- ===============================
       WALLET BALANCE
  ================================ -->
  <div class="wallet-balance" id="wallet-balance">
    Balance: ₦0
  </div>

  <!-- ===============================
       INVESTMENT PRODUCTS GRID
  ================================ -->
  <div class="investment-grid" id="investment-cards">
    <!-- JS will populate the 10 products here -->
  </div>

  <script src="lomashares-frontend.js"></script>
  <script>
    // Load dashboard products and update balance
    window.addEventListener('load', () => {
      const auth = getAuthUser();
      if (auth) document.getElementById('wallet-balance').innerText = `Balance: ₦${auth.balance}`;
      loadDashboardInvestments();
    });
  </script>

</body>
</html>
