<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lomashares Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Roboto', sans-serif; }
    body { background-color:#0a0a0a; color:#fff; min-height:100vh; display:flex; flex-direction:column; }

    /* Header */
    .header { position:sticky; top:0; background:linear-gradient(90deg,#000,#004080); display:flex; justify-content:space-between; align-items:center; padding:10px 20px; z-index:1000; }
    .logo-text { color:#00bfff; font-weight:bold; font-size:20px; letter-spacing:2px; }
    .menu-icon { cursor:pointer; display:flex; flex-direction:column; justify-content:center; }
    .menu-icon span { width:25px; height:3px; background:#00bfff; margin:4px 0; border-radius:2px; }
    .dropdown-menu { position:absolute; top:50px; left:20px; background:#001f4d; border-radius:8px; display:none; flex-direction:column; width:150px; box-shadow:0 5px 20px rgba(0,0,0,0.5);}
    .dropdown-menu a { color:white; text-decoration:none; padding:10px; transition:0.3s; }
    .dropdown-menu a:hover { background:#00bfff; color:#000; }

    /* Main container */
    .container { flex:1; padding:20px; max-width:1200px; margin:0 auto; }

    /* Wallet summary */
    .wallet { display:flex; justify-content:space-around; margin-bottom:20px; flex-wrap:wrap; }
    .wallet-card { background:#001f4d; padding:20px; border-radius:10px; flex:1 1 200px; margin:10px; text-align:center; box-shadow:0 4px 15px rgba(0,191,255,0.3); }
    .wallet-card h3 { color:#00bfff; margin-bottom:10px; }
    .wallet-card p { font-size:18px; font-weight:500; }

    /* Quick links */
    .quick-links { display:flex; justify-content:space-around; flex-wrap:wrap; margin-bottom:20px; }
    .quick-links button { background:#004080; color:#fff; border:none; padding:15px 25px; margin:10px; border-radius:10px; cursor:pointer; transition:all 0.3s; font-size:16px; }
    .quick-links button:hover { background:#00bfff; color:#000; transform:translateY(-2px); }

    /* Investment products */
    .products { display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:20px; }
    .product-card { background:#001f4d; padding:15px; border-radius:10px; box-shadow:0 4px 15px rgba(0,191,255,0.2); display:flex; flex-direction:column; justify-content:space-between; }
    .product-card h4 { color:#00bfff; margin-bottom:10px; }
    .product-card p { margin-bottom:8px; font-size:14px; }
    .product-card button { background:#00bfff; color:#000; padding:10px; border:none; border-radius:8px; cursor:pointer; font-weight:500; transition:all 0.3s; }
    .product-card button:disabled { background:#555; cursor:not-allowed; color:#ccc; }
    .product-card button:hover:not(:disabled) { background:#004080; color:#fff; transform:translateY(-2px); }

    /* Footer */
    footer { background:#000; padding:15px 20px; text-align:center; margin-top:auto; }
    footer a { color:#00bfff; text-decoration:none; margin:0 15px; transition:color 0.3s; }
    footer a:hover { color:#fff; }

    /* Responsive */
    @media(max-width:600px){ .wallet, .quick-links { flex-direction:column; align-items:center; } }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="menu-icon" onclick="toggleMenu()">
      <span></span><span></span><span></span>
    </div>
    <div class="logo-text">LOMASHARES</div>
    <div class="dropdown-menu" id="dropdownMenu">
      <a href="dashboard.html">Dashboard</a>
      <a href="profile.html">Profile</a>
      <a href="team.html">Team</a>
      <a href="#" onclick="logout()">Logout</a>
    </div>
  </header>

  <!-- Main Container -->
  <div class="container">
    <!-- Wallet -->
    <div class="wallet">
      <div class="wallet-card">
        <h3>Balance</h3>
        <p id="balance">₦0</p>
      </div>
      <div class="wallet-card">
        <h3>Total Deposited</h3>
        <p id="totalDeposited">₦0</p>
      </div>
      <div class="wallet-card">
        <h3>Total Withdrawn</h3>
        <p id="totalWithdrawn">₦0</p>
      </div>
    </div>

    <!-- Quick Links -->
    <div class="quick-links">
      <button onclick="depositPrompt()">Deposit</button>
      <button onclick="withdrawPrompt()">Withdraw</button>
      <button onclick="location.href='investment.html'">Invest</button>
      <button onclick="referFriend()">Refer</button>
    </div>

    <!-- Investment Products -->
    <div class="products" id="productList">
      <!-- JS will render products here -->
    </div>
  </div>

  <!-- Footer -->
  <footer>
    <a href="dashboard.html">Home</a>
    <a href="investment.html">Invest</a>
    <a href="team.html">Team</a>
    <a href="profile.html">Profile</a>
  </footer>

  <script type="module" src="lomashares-frontend.js"></script>
  <script>
    // Dropdown toggle
    function toggleMenu() {
      const menu = document.getElementById("dropdownMenu");
      menu.style.display = menu.style.display === "flex" ? "none" : "flex";
    }

    // Render wallet
    function renderWallet() {
      const user = JSON.parse(localStorage.getItem("authUser"));
      if(!user) return;
      document.getElementById("balance").textContent = "₦" + user.balance;
      document.getElementById("totalDeposited").textContent = "₦" + user.totalDeposited;
      document.getElementById("totalWithdrawn").textContent = "₦" + user.totalWithdrawn;
    }

    // Render products
    function renderProducts() {
      const user = JSON.parse(localStorage.getItem("authUser"));
      const productsContainer = document.getElementById("productList");
      productsContainer.innerHTML = "";
      const PRODUCTS = [
        { id: 1, price: 3000 },
        { id: 2, price: 5000 },
        { id: 3, price: 7000 },
        { id: 4, price: 10000 },
        { id: 5, price: 15000 },
        { id: 6, price: 20000 },
        { id: 7, price: 30000 },
        { id: 8, price: 40000 },
        { id: 9, price: 50000 },
        { id: 10, price: 100000 }
      ];

      PRODUCTS.forEach(product => {
        const investedTimes = user.investments.filter(inv => inv.productId === product.id).length;
        const card = document.createElement("div");
        card.className = "product-card";
        card.innerHTML = `
          <h4>Product #${product.id}</h4>
          <p>Price: ₦${product.price}</p>
          <p>Daily Income: ₦${(product.price*2/30).toFixed(2)}</p>
          <p>Days: 30</p>
          <button onclick="invest(${product.id})" ${investedTimes>=2 ? "disabled" : ""}>Invest</button>
        `;
        productsContainer.appendChild(card);
      });
    }

    // Deposit prompt
    function depositPrompt() {
      const amount = prompt("Enter deposit amount:");
      if(amount) deposit(parseFloat(amount));
    }

    // Withdraw prompt
    function withdrawPrompt() {
      const amount = prompt("Enter withdrawal amount:");
      if(amount) withdraw(parseFloat(amount));
    }

    // Refer friend
    function referFriend() {
      alert("Share your referral code with friends: " + JSON.parse(localStorage.getItem("authUser")).myReferralCode);
    }

    // Initialize dashboard
    window.addEventListener("load", function(){
      renderWallet();
      renderProducts();
    });
  </script>
</body>
</html>
