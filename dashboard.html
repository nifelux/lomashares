<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard | LomaShares</title>

  <script>
    window.__SUPABASE_URL__ = "https://lpnnqxalmihxgszoifpa.supabase.co";
    window.__SUPABASE_ANON_KEY__ = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxwbm5xeGFsbWloeGdzem9pZnBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3MzM1ODEsImV4cCI6MjA4NzMwOTU4MX0.1hLW5gizjcPTKyfzx_XD9dxqegtXVQroNCclX1AaqZw";
  </script>

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header"></header>

  <main class="container">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:12px">
        <div>
          <div style="font-weight:1000;font-size:14px;color:rgba(234,242,255,.9)">Available Balance</div>
          <div id="bal" style="font-weight:1000;font-size:22px;margin-top:6px">₦0</div>
          <div id="balHint" class="note" style="margin-top:6px">Fetching wallet…</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:12px;color:rgba(234,242,255,.75);font-weight:900">200% in 30 days</div>
          <div style="margin-top:6px" class="pTag">Mobile-first</div>
        </div>
      </div>
    </div>

    <div class="sectionTitle">Quick Links</div>
    <div class="quick">
      <a class="qbtn" href="deposit.html">
        <span style="width:22px;height:22px;display:inline-block;color:#7db7ff">${""}</span>
        <div>
          Deposit
          <small>Fund wallet</small>
        </div>
      </a>
      <a class="qbtn" href="withdraw.html">
        <div>
          Withdraw
          <small>Min ₦500</small>
        </div>
      </a>
      <a class="qbtn" href="gift.html">
        <div>
          Gift Code
          <small>Redeem coupon</small>
        </div>
      </a>
      <a class="qbtn" href="refer.html">
        <div>
          Refer
          <small>Earn 10%</small>
        </div>
      </a>
    </div>

    <div class="sectionTitle">Investment Products</div>
    <div id="products" style="display:flex;flex-direction:column;gap:10px"></div>

    <div class="note">Products can be bought up to <b>2 times per product lifetime</b>. (Enforce in backend.)</div>
  </main>

  <footer class="footer"></footer>

  <script type="module">
    import { guard } from "./auth.js";
    import { mountHeader, mountFooter, getUserEmail, fetchWalletBalanceByEmail } from "./ui.js";

    window.addEventListener("load", () => guard({ isPublicPage:false }));

    mountHeader({
      menuLinks: [
        { href:"dashboard.html", label:"Dashboard", icon:"home" },
        { href:"deposit.html", label:"Deposit", icon:"deposit" },
        { href:"withdraw.html", label:"Withdraw", icon:"withdraw" },
        { href:"profile.html", label:"Profile", icon:"profile" }
      ]
    });
    mountFooter("home");

    const PRODUCTS = [
      { id:1, price:3000 },
      { id:2, price:5000 },
      { id:3, price:7000 },
      { id:4, price:10000 },
      { id:5, price:15000 },
      { id:6, price:20000 },
      { id:7, price:30000 },
      { id:8, price:40000 },
      { id:9, price:50000 },
      { id:10, price:100000 },
    ];
    const DAYS = 30;
    const TOTAL_RETURN_MULT = 2; // 200%

    function naira(n){ return "₦" + Number(n||0).toLocaleString(); }

    function renderProducts(){
      const box = document.getElementById("products");
      box.innerHTML = "";
      PRODUCTS.forEach(p=>{
        const totalReturn = p.price * TOTAL_RETURN_MULT;
        const daily = totalReturn / DAYS;

        const div = document.createElement("div");
        div.className = "product";
        div.innerHTML = `
          <div>
            <h4>Product ${p.id} • ${naira(p.price)}</h4>
            <p>Daily income: <b>${naira(daily.toFixed(2))}</b><br>Return: <b>200%</b> in <b>${DAYS} days</b></p>
          </div>
          <div class="pRight">
            <div class="pTag">Active</div>
            <button class="btnOutline" type="button" data-id="${p.id}">Invest</button>
          </div>
        `;
        box.appendChild(div);
      });

      box.querySelectorAll("button[data-id]").forEach(btn=>{
        btn.addEventListener("click", ()=>{
          const pid = btn.getAttribute("data-id");
          // You will later call your backend /api/investment here.
          alert("Invest clicked for Product " + pid + ". (Connect to /api/investment.js next)");
        });
      });
    }

    async function loadWallet(){
      const email = await getUserEmail();
      const hint = document.getElementById("balHint");
      if (!email){ hint.textContent = "Not logged in"; return; }
      try{
        const bal = await fetchWalletBalanceByEmail(email);
        document.getElementById("bal").textContent = naira(bal);
        hint.textContent = "Wallet updated.";
      }catch(e){
        hint.textContent = "Wallet error: " + e.message;
      }
    }

    renderProducts();
    loadWallet();
  </script>
</body>
</html>
