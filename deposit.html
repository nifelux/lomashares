<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Deposit | LomaShares</title>

  <!-- Paystack Inline (must load) -->
  <script src="https://js.paystack.co/v1/inline.js"></script>

  <style>
    *{box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial}
    body{margin:0;background:#071428;color:#eaf2ff}
    .header{
      position:sticky;top:0;z-index:10;
      height:60px;display:flex;align-items:center;justify-content:center;
      background:linear-gradient(90deg,#050b16,#0b2a59);
      box-shadow:0 10px 30px rgba(0,0,0,.35);
      font-weight:900;letter-spacing:2px;color:#7db7ff
    }
    .wrap{padding:16px 14px 92px;max-width:520px;margin:0 auto}
    .card{
      background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.03));
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;padding:18px;
      box-shadow:0 14px 40px rgba(0,0,0,.35);
    }
    .title{font-size:18px;font-weight:800;margin:0 0 10px}
    .sub{margin:0 0 16px;color:rgba(234,242,255,.8);font-size:13px;line-height:1.4}
    .amountBox{
      width:100%;background:#020817;border:1px solid rgba(255,255,255,.08);
      border-radius:14px;padding:14px;
      display:flex;align-items:center;gap:10px
    }
    .naira{
      width:34px;height:34px;border-radius:10px;
      background:linear-gradient(135deg,#f7d56a,#caa33a);
      display:flex;align-items:center;justify-content:center;
      color:#121212;font-weight:900
    }
    input{
      width:100%;border:none;outline:none;background:transparent;
      color:#eaf2ff;font-size:18px;font-weight:800
    }
    input::placeholder{color:rgba(234,242,255,.45);font-weight:600}
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}
    .qbtn{
      padding:12px 10px;border:none;border-radius:14px;
      cursor:pointer;font-weight:900;
      color:#0b1220;background:linear-gradient(135deg,#f7d56a,#caa33a);
      box-shadow:0 10px 22px rgba(202,163,58,.18);
    }
    .qbtn:active{transform:scale(.98)}
    .paybtn{
      width:100%;margin-top:16px;padding:14px 12px;border:none;border-radius:16px;
      background:linear-gradient(90deg,#1b6bff,#0b2a59);
      color:#fff;font-weight:900;font-size:16px;cursor:pointer;
      box-shadow:0 18px 35px rgba(27,107,255,.22);
    }
    .paybtn[disabled]{opacity:.55;cursor:not-allowed}
    .note{
      margin-top:12px;font-size:12px;color:rgba(234,242,255,.75);
      background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
      padding:10px;border-radius:14px;line-height:1.45
    }
    .footer{
      position:fixed;left:0;right:0;bottom:0;z-index:10;
      height:70px;background:#050b16;border-top:1px solid rgba(255,255,255,.08);
      display:flex;justify-content:space-around;align-items:center
    }
    .fitem{color:rgba(234,242,255,.85);text-decoration:none;font-size:12px;font-weight:800}
  </style>
</head>

<body>
  <div class="header">LOMASHARES</div>

  <div class="wrap">
    <div class="card">
      <p class="title">Deposit Funds</p>
      <p class="sub">Choose a quick amount or enter a custom amount. Payment is processed securely via Paystack.</p>

      <div class="amountBox">
        <div class="naira">₦</div>
        <input id="amount" type="number" inputmode="numeric" placeholder="Enter amount e.g 5000" />
      </div>

      <div class="grid">
        <button class="qbtn" data-amt="1000">₦1,000</button>
        <button class="qbtn" data-amt="5000">₦5,000</button>
        <button class="qbtn" data-amt="10000">₦10,000</button>
        <button class="qbtn" data-amt="30000">₦30,000</button>
        <button class="qbtn" data-amt="50000">₦50,000</button>
        <button class="qbtn" data-amt="100000">₦100,000</button>
      </div>

      <button class="paybtn" id="payBtn" type="button" onclick="handleDepositClick()">Pay with Paystack</button>
      <div class="note">
        ✅ Your wallet is credited only after Paystack verifies the payment.<br/>
        ⚠️ If you close the payment window, your balance will not change.
      </div>
    </div>
  </div>

  <div class="footer">
    <a class="fitem" href="dashboard.html">Home</a>
    <a class="fitem" href="investment.html">Invest</a>
    <a class="fitem" href="team.html">Team</a>
    <a class="fitem" href="profile.html">Profile</a>
  </div>
<script src="https://js.paystack.co/v1/inline.js"></script>
<script>
  const PAYSTACK_PUBLIC_KEY = "pk_live_cd8547f6b4270551729c247d8d31635691c39a08";

  function getUserEmail() {
    const au = localStorage.getItem("authUser");
    if (!au) return null;
    try {
      const u = JSON.parse(au);
      return u?.email || null;
    } catch {
      return null;
    }
  }

  function makeRef() {
    return "LS-" + Date.now() + "-" + Math.floor(Math.random() * 100000);
  }

  async function verifyAndCredit(reference, amount, userEmail) {
    const res = await fetch("/api/deposit-verify", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ reference, amount, userEmail })
    });
    return res.json();
  }

  window.handleDepositClick = function () {
    const email = getUserEmail();
    if (!email) {
      alert("Login not detected. Please login again.");
      window.location.href = "index.html";
      return;
    }

    const amountEl = document.getElementById("amount");
    const amount = Number(amountEl?.value);

    if (!amount || amount < 1000) {
      alert("Minimum deposit is ₦1,000");
      return;
    }

    if (typeof PaystackPop === "undefined") {
      alert("Paystack failed to load. Check your network/adblocker.");
      return;
    }

    const ref = makeRef();

    PaystackPop.setup({
      key: PAYSTACK_PUBLIC_KEY,
      email,
      amount: amount * 100,
      currency: "NGN",
      ref,
      callback: async function (resp) {
        try {
          const data = await verifyAndCredit(resp.reference, amount, email);
          if (data.error) return alert(data.error);

          alert("Deposit successful! New balance: ₦" + Number(data.newBalance).toLocaleString());
          amountEl.value = "";
        } catch (e) {
          console.error(e);
          alert("Deposit verification failed. Try again.");
        }
      },
      onClose: function () {
        alert("Payment cancelled");
      }
    }).openIframe();
  };
      </script>
  <script>
    // ✅ Put your Paystack PUBLIC key here (pk_live... or pk_test...)
    const PAYSTACK_PUBLIC_KEY = "pk_live_cd8547f6b4270551729c247d8d31635691c39a08";

    function makeRef() {
      return "LS-" + Date.now() + "-" + Math.floor(Math.random() * 100000);
    }

    async function verifyAndCredit(reference, amount, userEmail) {
      const res = await fetch("/api/deposit-verify", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ reference, amount, userEmail })
      });
      return res.json();
    }

    document.addEventListener("DOMContentLoaded", () => {
      const authUser = JSON.parse(localStorage.getItem("authUser") || "null");
      if (!authUser || !authUser.email) {
        alert("Please login first");
        window.location.href = "index.html";
        return;
      }

      const amountEl = document.getElementById("amount");
      const payBtn = document.getElementById("payBtn");

      // Wire quick buttons
      document.querySelectorAll(".qbtn").forEach(btn => {
        btn.addEventListener("click", () => {
          amountEl.value = btn.dataset.amt;
        });
      });

      // Wire deposit button
      payBtn.addEventListener("click", async () => {
        // 1) Confirm Paystack script is loaded
        if (typeof PaystackPop === "undefined") {
          alert("Paystack failed to load. Check network / adblocker.");
          return;
        }

        // 2) Validate amount
        const amount = Number(amountEl.value);
        if (!amount || amount < 1000) {
          alert("Minimum deposit is ₦1,000");
          return;
        }

        // 3) Open Paystack
        const ref = makeRef();
        payBtn.disabled = true;

        const handler = PaystackPop.setup({
          key: PAYSTACK_PUBLIC_KEY,
          email: authUser.email,
          amount: amount * 100, // kobo
          currency: "NGN",
          ref,
          callback: async function(resp) {
            try {
              const data = await verifyAndCredit(resp.reference, amount, authUser.email);
              if (data.error) {
                alert(data.error);
                return;
              }
              alert("Deposit successful! New balance: ₦" + Number(data.newBalance).toLocaleString());
              amountEl.value = "";
            } catch (e) {
              console.error(e);
              alert("Deposit verification failed. Try again.");
            } finally {
              payBtn.disabled = false;
            }
          },
          onClose: function() {
            payBtn.disabled = false;
            alert("Payment cancelled");
          }
        });

        handler.openIframe();
      });
    });
  </script>
</body>
          </html>
