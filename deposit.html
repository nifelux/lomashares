<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deposit | LomaShares</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://js.paystack.co/v1/inline.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background: #f0f2f5; margin:0; padding:0;}
    header, footer { background: #004aad; color: #fff; padding: 15px; text-align: center; font-weight: bold;}
    .container { padding: 20px; }
    .input-group { display: flex; flex-direction: column; margin-bottom: 20px; }
    .input-group input { font-size: 18px; padding: 10px; border-radius: 10px; border: 1px solid #ccc; text-align: right; }
    .quick-amounts { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
    .quick-amounts button { flex: 1 1 30%; padding: 15px; background: #ffd700; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; color: #000; }
    .deposit-btn { width: 100%; padding: 20px; background: linear-gradient(90deg,#004aad,#001f4d); color: #fff; border: none; border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer; }
    .deposit-btn:hover { opacity: 0.9; }
  </style>
</head>
<body>

<header>LomaShares Deposit</header>

<div class="container">
  <div class="input-group">
    <label for="deposit-amount">Enter Amount</label>
    <input type="number" id="deposit-amount" placeholder="₦0" min="100" />
  </div>

  <div class="quick-amounts">
    <button data-amount="1000">₦1,000</button>
    <button data-amount="5000">₦5,000</button>
    <button data-amount="10000">₦10,000</button>
    <button data-amount="30000">₦30,000</button>
    <button data-amount="50000">₦50,000</button>
    <button data-amount="100000">₦100,000</button>
  </div>

  <button class="deposit-btn" id="deposit-btn">Deposit Now</button>
</div>

<footer>
  <i class="fas fa-home"></i> Home &nbsp;
  <i class="fas fa-wallet"></i> Invest &nbsp;
  <i class="fas fa-users"></i> Team &nbsp;
  <i class="fas fa-user"></i> Profile
</footer>

<script>
  // Mock auth user (replace with real login)
  const authUser = JSON.parse(localStorage.getItem("authUser")) || { email: "user@example.com", balance: 0 };

  const depositInput = document.getElementById("deposit-amount");
  const quickButtons = document.querySelectorAll(".quick-amounts button");
  const depositBtn = document.getElementById("deposit-btn");

  // Quick amount buttons
  quickButtons.forEach(btn => {
    btn.addEventListener("click", () => {
      depositInput.value = btn.dataset.amount;
    });
  });

  // Deposit function
  depositBtn.addEventListener("click", () => {
    const amount = parseInt(depositInput.value);
    if (!amount || amount < 100) return alert("Enter a valid amount");

    // Paystack Checkout
    const handler = PaystackPop.setup({
      key: "YOUR_PUBLIC_PAYSTACK_KEY",
      email: authUser.email,
      amount: amount * 100, // kobo
      currency: "NGN",
      callback: async function(response) {
        try {
          // Call Supabase wallet API
          const res = await fetch("/api/wallet", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ amount, userEmail: authUser.email })
          });
          const data = await res.json();
          if (!res.ok) return alert(data.error || "Deposit failed");
          
          // Update balance locally
          authUser.balance = data.newBalance;
          localStorage.setItem("authUser", JSON.stringify(authUser));
          alert(`Deposit successful! New balance: ₦${authUser.balance.toLocaleString()}`);
          depositInput.value = "";
        } catch (err) {
          console.error(err);
          alert("Error updating wallet");
        }
      },
      onClose: function() {
        alert("Payment canceled");
      }
    });
    handler.openIframe();
  });
</script>

</body>
  </html>
