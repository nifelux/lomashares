<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deposit | Lomashares</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous">
<style>
  /* ====== MOBILE PREMIUM STYLE ====== */
  body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f5f8fa;
    color: #111;
  }
  header {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 15px 0;
    background: linear-gradient(90deg, #0d6efd, #6610f2);
    color: #fff;
    font-weight: bold;
    font-size: 20px;
    position: sticky;
    top: 0;
  }
  .container {
    padding: 15px;
  }
  .input-group {
    display: flex;
    flex-direction: column;
    margin-bottom: 15px;
  }
  .input-group input {
    padding: 12px;
    font-size: 16px;
    border-radius: 8px;
    border: 1px solid #ccc;
    width: 100%;
    box-sizing: border-box;
  }
  .quick-amounts {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 20px;
  }
  .quick-amounts button {
    flex: 1 1 30%;
    padding: 12px 0;
    font-weight: bold;
    border: none;
    border-radius: 8px;
    background: gold;
    color: #000;
    font-size: 16px;
    cursor: pointer;
    transition: 0.2s;
  }
  .quick-amounts button:hover {
    background: #ffcc00;
  }
  .deposit-btn {
    padding: 15px;
    width: 100%;
    font-size: 18px;
    font-weight: bold;
    background: #0d6efd;
    color: #fff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.2s;
  }
  .deposit-btn:hover {
    background: #0056b3;
  }
  footer {
    display: flex;
    justify-content: space-around;
    align-items: center;
    padding: 10px 0;
    position: sticky;
    bottom: 0;
    background: #111;
    color: #fff;
    font-size: 14px;
  }
  footer a {
    text-decoration: none;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  footer a i {
    font-size: 18px;
    margin-bottom: 3px;
  }
</style>
</head>
<body>

<header>Lomashares</header>

<div class="container">
  <div class="input-group">
    <label for="deposit-amount">Enter Amount</label>
    <input type="number" id="deposit-amount" placeholder="₦0">
  </div>

  <div class="quick-amounts">
    <button onclick="setQuickAmount(1000)">₦1,000</button>
    <button onclick="setQuickAmount(5000)">₦5,000</button>
    <button onclick="setQuickAmount(10000)">₦10,000</button>
    <button onclick="setQuickAmount(30000)">₦30,000</button>
    <button onclick="setQuickAmount(50000)">₦50,000</button>
    <button onclick="setQuickAmount(100000)">₦100,000</button>
  </div>

  <button class="deposit-btn" onclick="handleDeposit()">Deposit</button>
</div>

<footer>
  <a href="index.html"><i class="fas fa-home"></i>Home</a>
  <a href="investment.html"><i class="fas fa-chart-line"></i>Invest</a>
  <a href="team.html"><i class="fas fa-users"></i>Team</a>
  <a href="profile.html"><i class="fas fa-user"></i>Profile</a>
</footer>

<script src="https://js.paystack.co/v1/inline.js"></script>
<script>
  const PAYSTACK_PUBLIC_KEY = "YOUR_PAYSTACK_PUBLIC_KEY_HERE";

  function setQuickAmount(value) {
    document.getElementById('deposit-amount').value = value;
  }

  async function handleDeposit() {
    const amountInput = document.getElementById('deposit-amount');
    let amount = parseFloat(amountInput.value);
    if (isNaN(amount) || amount <= 0) {
      alert("Enter a valid amount");
      return;
    }

    const user = JSON.parse(localStorage.getItem('authUser'));
    if (!user) {
      alert("User not logged in");
      window.location.href = "index.html";
      return;
    }

    // Convert amount to kobo for Paystack
    const amountKobo = amount * 100;

    // Initialize Paystack payment
    const handler = PaystackPop.setup({
      key: PAYSTACK_PUBLIC_KEY,
      email: user.email,
      amount: amountKobo,
      currency: "NGN",
      onClose: function() {
        alert('Payment was not completed.');
      },
      callback: async function(response) {
        // On successful payment, call wallet API
        try {
          const res = await fetch("/api/wallet", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ amount, userEmail: user.email, reference: response.reference })
          });

          const data = await res.json();
          if (data.error) {
            alert("Wallet update failed: " + data.error);
          } else {
            alert("Deposit successful!");
            // Update local storage
            user.balance = data.newBalance;
            localStorage.setItem("authUser", JSON.stringify(user));
          }
        } catch (err) {
          alert("Error connecting to wallet API");
        }
      }
    });
    handler.openIframe();
  }
</script>

</body>
</html>
