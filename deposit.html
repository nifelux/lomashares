<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lomashares Deposit</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <!-- Font Awesome for Icons -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Roboto', sans-serif; }
    body { background:#0b0b0b; color:#fff; display:flex; flex-direction:column; min-height:100vh; }
    header { height:60px; background: linear-gradient(to right,#000,#0a1f44); display:flex; align-items:center; justify-content:center; position:fixed; top:0; width:100%; z-index:1000; }
    .logo-text { color:#1e90ff; font-weight:bold; font-size:20px; text-align:center; }
    main { flex:1; padding:80px 20px 100px; width:100%; max-width:480px; margin:0 auto; }
    .card { background:#111; padding:20px; border-radius:15px; margin-bottom:20px; }
    input { width:100%; padding:15px; border-radius:10px; border:none; margin-bottom:10px; font-size:16px; }
    .shortcuts { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:15px; }
    .shortcuts button { flex:1 1 30%; padding:10px; border:none; border-radius:10px; background:#004080; color:#fff; font-weight:500; cursor:pointer; transition:0.3s; }
    .shortcuts button:hover { background:#1e90ff; }
    .btn { width:100%; padding:15px; border:none; border-radius:10px; background:#00bfff; color:#fff; font-size:18px; cursor:pointer; transition:0.3s; }
    .btn:hover { background:#004080; }
    footer { height:60px; background:#000; display:flex; justify-content:space-around; align-items:center; position:fixed; bottom:0; width:100%; }
    footer a { color:#888; font-size:24px; text-decoration:none; text-align:center; }
    footer a span { display:block; font-size:12px; color:#fff; margin-top:2px; }
  </style>
</head>
<body>
<header>
  <div class="logo-text">LOMASHARES</div>
</header>

<main>
  <div class="card">
    <input type="number" id="deposit-amount" placeholder="Enter amount" min="1000">
    <div class="shortcuts">
      <button onclick="setAmount(1000)">#1000</button>
      <button onclick="setAmount(5000)">#5000</button>
      <button onclick="setAmount(10000)">#10000</button>
      <button onclick="setAmount(30000)">#30000</button>
      <button onclick="setAmount(50000)">#50000</button>
      <button onclick="setAmount(100000)">#100000</button>
    </div>
    <button class="btn" onclick="handleDeposit()">Deposit</button>
  </div>
</main>

<footer>
  <a href="dashboard.html"><i class="fas fa-home"></i><span>Home</span></a>
  <a href="investment.html"><i class="fas fa-coins"></i><span>Invest</span></a>
  <a href="team.html"><i class="fas fa-users"></i><span>Team</span></a>
  <a href="profile.html"><i class="fas fa-user"></i><span>Profile</span></a>
</footer>

<script>
  function setAmount(val) {
    document.getElementById("deposit-amount").value = val;
  }

  async function handleDeposit() {
    const amount = parseFloat(document.getElementById("deposit-amount").value);
    if (!amount || amount < 1000) return alert("Enter a valid amount");

    const auth = JSON.parse(localStorage.getItem("authUser"));
    if (!auth) return window.location.href = "index.html";

    try {
      const res = await fetch("/api/wallet", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ amount, userEmail: auth.email })
      });

      const data = await res.json();
      if (res.ok) {
        alert("Deposit successful: #" + data.amount);
        auth.balance = data.newBalance;
        localStorage.setItem("authUser", JSON.stringify(auth));
        window.location.reload();
      } else {
        alert("Deposit failed: " + data.error);
      }
    } catch (err) {
      console.error(err);
      alert("Error connecting to wallet API");
    }
  }
</script>
</body>
  </html>
