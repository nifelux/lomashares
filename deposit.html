<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Deposit | LomaShares</title>

  <script>
    window.__SUPABASE_URL__ = "https://lpnnqxalmihxgszoifpa.supabase.co";
    window.__SUPABASE_ANON_KEY__ = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxwbm5xeGFsbWloeGdzem9pZnBhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3MzM1ODEsImV4cCI6MjA4NzMwOTU4MX0.1hLW5gizjcPTKyfzx_XD9dxqegtXVQroNCclX1AaqZw";
  </script>

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header"></header>

  <main class="container">
    <div class="card">
      <h3 style="margin:0;font-weight:1000">Fund Wallet</h3>
      <div class="note">Minimum deposit: <b>₦1,000</b>. You’ll be redirected to Paystack to complete payment.</div>

      <div class="field"><div class="dot"></div><input id="amount" inputmode="numeric" placeholder="Enter amount (₦)"></div>

      <div class="sectionTitle">Quick Amount</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btnOutline" type="button" data-amt="1000">₦1,000</button>
        <button class="btnOutline" type="button" data-amt="5000">₦5,000</button>
        <button class="btnOutline" type="button" data-amt="10000">₦10,000</button>
        <button class="btnOutline" type="button" data-amt="30000">₦30,000</button>
        <button class="btnOutline" type="button" data-amt="50000">₦50,000</button>
        <button class="btnOutline" type="button" data-amt="100000">₦100,000</button>
      </div>

      <button class="btn" id="depositBtn" type="button">Continue to Paystack</button>
      <div class="note" id="msg"></div>
    </div>
  </main>

  <footer class="footer"></footer>

  <script type="module">
    import { guard } from "./auth.js";
    import { mountHeader, mountFooter, getUserEmail } from "./ui.js";

    window.addEventListener("load", () => guard({ isPublicPage:false }));

    mountHeader({
      menuLinks: [
        { href:"dashboard.html", label:"Dashboard", icon:"home" },
        { href:"deposit.html", label:"Deposit", icon:"deposit" },
        { href:"withdraw.html", label:"Withdraw", icon:"withdraw" },
      ]
    });
    mountFooter("home");

    const amountEl = document.getElementById("amount");
    const msg = document.getElementById("msg");

    document.querySelectorAll("button[data-amt]").forEach(b=>{
      b.addEventListener("click", ()=>{
        amountEl.value = b.getAttribute("data-amt");
      });
    });

    document.getElementById("depositBtn").addEventListener("click", async ()=>{
      const email = await getUserEmail();
      const amount = Number(String(amountEl.value||"").replace(/[^0-9.]/g,""));
      if (!email) return alert("Not logged in");
      if (!amount || amount < 1000) return alert("Minimum deposit is ₦1,000");

      msg.textContent = "Redirecting to Paystack…";

      // Redirect flow (requires api/deposit-init.js)
      try{
        const r = await fetch("/api/deposit-init", {
          method:"POST",
          headers:{ "Content-Type":"application/json" },
          body: JSON.stringify({ email, amount })
        });
        const data = await r.json();
        if (!r.ok || data.error) throw new Error(data.error || "Deposit init failed");
        window.location.href = data.authorization_url;
      }catch(e){
        msg.textContent = "Error: " + e.message;
      }
    });
  </script>
</body>
</html>
