<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register | LomaShares</title>

  <script>
    window.__SUPABASE_URL__ = "YOUR_SUPABASE_URL_HERE";
    window.__SUPABASE_ANON_KEY__ = "YOUR_SUPABASE_ANON_KEY_HERE";
  </script>

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header"></header>

  <main class="container">
    <div class="card">
      <h2 style="margin:6px 0 6px;text-align:center;font-weight:1000">Create account</h2>
      <div class="note" style="text-align:center;margin-top:0">Wallet is created automatically after signup.</div>

      <div class="field"><div class="dot"></div><input id="email" type="email" placeholder="Email address"></div>
      <div class="field"><div class="dot"></div><input id="referral" type="text" placeholder="Referral code (optional)"></div>
      <div class="field"><div class="dot"></div><input id="password" type="password" placeholder="Password (min 6 chars)"></div>
      <div class="field"><div class="dot"></div><input id="confirm" type="password" placeholder="Confirm password"></div>

      <button class="btn" id="regBtn" type="button">Create account</button>
      <button class="btnOutline" type="button" onclick="location.href='index.html'">Back to login</button>

      <div class="note" id="msg">Referral bonus: 10% of referral investment price.</div>
    </div>
  </main>

  <script type="module">
    import { guard, doRegister, supabase } from "./auth.js";
    import { mountHeader } from "./ui.js";

    window.addEventListener("load", () => guard({ isPublicPage: true }));

    mountHeader({
      menuLinks: [
        { href:"index.html", label:"Login", icon:"home" },
        { href:"register.html", label:"Register", icon:"profile" }
      ]
    });

    function setMsg(t){ document.getElementById("msg").textContent = t; }

    async function validateReferral(code){
      if (!code) return true;
      const { data, error } = await supabase
        .from("profiles")
        .select("id")
        .eq("referral_code", code)
        .limit(1);
      if (error) return false;
      return (data && data.length > 0);
    }

    document.getElementById("regBtn").addEventListener("click", async () => {
      const email = document.getElementById("email").value.trim().toLowerCase();
      const ref = document.getElementById("referral").value.trim().toUpperCase();
      const pass = document.getElementById("password").value.trim();
      const conf = document.getElementById("confirm").value.trim();

      if (!email || !pass || !conf) return alert("All fields required");
      if (pass.length < 6) return alert("Password must be at least 6 characters");
      if (pass !== conf) return alert("Passwords do not match");

      if (ref){
        setMsg("Checking referral code...");
        const ok = await validateReferral(ref);
        if (!ok){ setMsg("Invalid referral code"); return alert("Invalid referral code"); }
      }

      try{
        await doRegister(email, pass);

        // After signup, profile trigger creates profile + wallet.
        // If referral is provided, store it for later backend referral processing.
        // (Optional) If you want: update referred_by now (requires user id; can be done after user confirms email).
      }catch(e){
        alert(e.message);
        setMsg(e.message);
      }
    });
  </script>
</body>
</html>
