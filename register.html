<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lomashares Register</title>
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  
  <style>
    /* ------------------- */
    /* Base Styles */
    /* ------------------- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Roboto', sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #0a0a0a, #001f4d);
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
    }

    /* ------------------- */
    /* Register Container */
    /* ------------------- */
    .register-container {
      background-color: #0b0b0b;
      width: 100%;
      max-width: 400px;
      padding: 40px 30px;
      border-radius: 15px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.5);
      text-align: center;
    }

    /* ------------------- */
    /* Logo */
    /* ------------------- */
    .register-container .logo {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      margin-bottom: 20px;
      object-fit: cover;
      border: 2px solid #00bfff;
    }

    /* ------------------- */
    /* Heading */
    /* ------------------- */
    .register-container h1 {
      margin-bottom: 25px;
      font-size: 28px;
      font-weight: 700;
      color: #00bfff;
    }

    /* ------------------- */
    /* Input Fields */
    /* ------------------- */
    .register-container input {
      width: 100%;
      padding: 15px 20px;
      margin: 10px 0;
      border-radius: 10px;
      border: none;
      outline: none;
      font-size: 16px;
      background-color: #111;
      color: #fff;
    }

    .register-container input::placeholder {
      color: #888;
    }

    /* ------------------- */
    /* Buttons */
    /* ------------------- */
    .register-container button {
      width: 100%;
      padding: 15px;
      margin-top: 15px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(90deg, #00bfff, #004080);
      color: #fff;
      font-size: 18px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .register-container button:hover {
      background: linear-gradient(90deg, #004080, #00bfff);
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(0,191,255,0.4);
    }

    /* ------------------- */
    /* Links */
    /* ------------------- */
    .register-container .login-link {
      display: block;
      margin-top: 20px;
      font-size: 14px;
      color: #888;
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .register-container .login-link:hover {
      color: #00bfff;
    }

    /* ------------------- */
    /* Mobile Friendly */
    /* ------------------- */
    @media (max-width: 480px) {
      .register-container {
        padding: 35px 20px;
      }
    }
  </style>
</head>
<body>

  <div class="register-container">
    <!-- Logo -->
    <img src="https://pix1.b442d6eefbd6173bad7ee5bde6cd31e8.com/download/1883a493e66deeb1c3e78de269ba8aff/waploaded+wapo+mobi/Lomashares-(waploaded.wapo.mobi).jpg" alt="Lomashares Logo" class="logo">

    <h1>Create Account</h1>

<input type="email" id="email" placeholder="Email">
<input type="text" id="referral-code" placeholder="Referral Code (Optional)">
<input type="password" id="password" placeholder="Password">
<input type="password" id="confirm-password" placeholder="Confirm Password">

<button onclick="handleRegister()">Register</button>
    <a href="index.html" class="login-link">Already have an account? Login</a>
  </div>

  <script type="module" src="lomashares-frontend.js"></script>
<script>
    const registerBtn = document.getElementById('register-btn');
    registerBtn.addEventListener('click', () => {
      const email = document.getElementById('register-email').value;
      const password = document.getElementById('register-password').value;
      if(!email || !password) return alert('Please fill all fields');
      register(email, password); // Calls lomashares-frontend.js register function
    });
  </script>
</body>
</html>
