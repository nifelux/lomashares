  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header"></header>

  <main class="container">
    <div class="card">
      <div style="display:flex;gap:14px;align-items:center;padding:12px;border-radius:18px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08)">
        <div style="flex:0 0 40%;display:flex;justify-content:center">
          <div id="avatar" style="width:92px;height:92px;border-radius:50%;
            background:radial-gradient(circle at 30% 30%, #1b6bff, #0b2a59 55%, #050b16 100%);
            border:3px solid rgba(247,213,106,.9);
            display:flex;align-items:center;justify-content:center;
            font-weight:1000;font-size:30px;letter-spacing:1px;">LS</div>
        </div>
        <div style="flex:1 1 60%">
          <div id="name" style="font-weight:1000;font-size:18px">Loading…</div>
          <div id="email" class="note" style="margin-top:6px;word-break:break-all">Loading…</div>
        </div>
      </div>

      <div style="margin-top:12px;padding:14px;border-radius:18px;background:rgba(247,213,106,.12);border:1px solid rgba(247,213,106,.35)">
        <div style="font-size:12px;font-weight:1000;color:rgba(234,242,255,.85);letter-spacing:.8px">WALLET BALANCE</div>
        <div id="bal" style="font-size:22px;font-weight:1000;margin-top:6px">₦0</div>
        <div id="balHint" class="note" style="margin-top:6px">Fetching…</div>
      </div>

      <div class="sectionTitle">Quick Links</div>
      <div class="quick">
        <a class="qbtn" href="deposit.html"><div>Deposit<small>Fund wallet</small></div></a>
        <a class="qbtn" href="withdraw.html"><div>Withdraw<small>Min ₦500</small></div></a>
        <a class="qbtn" href="gift.html"><div>Gift Code<small>Redeem</small></div></a>
        <a class="qbtn" href="refer.html"><div>Refer<small>Earn 10%</small></div></a>
      </div>

      <div class="sectionTitle">More</div>
      <div class="bigList">
        <button class="bigBtn" onclick="location.href='transactions.html'">Transaction History <span>All activity</span></button>
        <button class="bigBtn" onclick="location.href='deposit-history.html'">Deposit History <span>All deposits</span></button>
        <button class="bigBtn" onclick="location.href='withdrawal-history.html'">Withdrawal History <span>All withdrawals</span></button>
        <button class="bigBtn" onclick="window.open('https://t.me/YOUR_TELEGRAM_LINK','_blank')">Join Telegram <span>Support group</span></button>
        <button class="bigBtn" onclick="window.open('https://chat.whatsapp.com/YOUR_WHATSAPP_LINK','_blank')">Join WhatsApp <span>Community</span></button>
        <button class="btn btnDanger" id="logoutBtn" type="button">Logout</button>
      </div>
    </div>
  </main>

  <footer class="footer"></footer>

  <script type="module">
    import { guard, doLogout } from "./auth.js";
    import { mountHeader, mountFooter, getUserEmail, emailToName, fetchWalletBalanceByEmail } from "./ui.js";

    window.addEventListener("load", () => guard({ isPublicPage:false }));

    mountHeader({
      menuLinks: [
        { href:"dashboard.html", label:"Dashboard", icon:"home" },
        { href:"investment.html", label:"Investments", icon:"invest" },
        { href:"profile.html", label:"Profile", icon:"profile" }
      ]
    });
    mountFooter("profile");

    function naira(n){ return "₦" + Number(n||0).toLocaleString(); }

    async function load(){
      const email = await getUserEmail();
      if (!email) return;

      document.getElementById("email").textContent = email;
      document.getElementById("name").textContent = emailToName(email);
      document.getElementById("avatar").textContent = (emailToName(email)[0] || "L").toUpperCase() + "S";

      const hint = document.getElementById("balHint");
      try{
        const bal = await fetchWalletBalanceByEmail(email);
        document.getElementById("bal").textContent = naira(bal);
        hint.textContent = "Wallet updated.";
      }catch(e){
        hint.textContent = "Wallet error: " + e.message;
      }
    }

    document.getElementById("logoutBtn").addEventListener("click", doLogout);
    load();
  </script>
</body>
  </html>
