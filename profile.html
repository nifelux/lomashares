<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile | LomaShares</title>

  <style>
    *{box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial}
    body{margin:0;background:#071428;color:#eaf2ff}

    /* ===== Header ===== */
    .header{
      position:sticky;top:0;z-index:10;
      height:60px;display:flex;align-items:center;justify-content:center;
      background:linear-gradient(90deg,#050b16,#0b2a59);
      box-shadow:0 10px 30px rgba(0,0,0,.35);
      font-weight:900;letter-spacing:2px;color:#7db7ff;
    }

    .wrap{padding:16px 14px 92px;max-width:520px;margin:0 auto}

    .card{
      background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.03));
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;padding:16px;
      box-shadow:0 14px 40px rgba(0,0,0,.35);
    }

    .profileRow{
      display:flex;gap:14px;align-items:center;
      padding:14px;border-radius:16px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);
    }

    .avatarBox{
      flex:0 0 40%;
      display:flex;align-items:center;justify-content:center;
    }

    .avatar{
      width:92px;height:92px;border-radius:50%;
      background:linear-gradient(135deg,#1b6bff,#0b2a59);
      border:3px solid rgba(247,213,106,.9);
      display:flex;align-items:center;justify-content:center;
      font-weight:900;font-size:30px;color:#fff;
      box-shadow:0 14px 30px rgba(27,107,255,.18);
    }

    .infoBox{flex:1 1 60%}
    .name{margin:0;font-size:18px;font-weight:900}
    .email{margin:6px 0 0;color:rgba(234,242,255,.78);font-size:13px;word-break:break-all}

    .balanceCard{
      margin-top:14px;
      padding:14px;border-radius:16px;
      background:linear-gradient(135deg,rgba(247,213,106,.18),rgba(27,107,255,.08));
      border:1px solid rgba(247,213,106,.35);
    }
    .balLabel{font-size:12px;color:rgba(234,242,255,.8);font-weight:800;letter-spacing:.6px}
    .balValue{margin-top:6px;font-size:22px;font-weight:1000}

    .quick{
      margin-top:14px;
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:10px;
    }
    .qbtn{
      text-decoration:none;color:#eaf2ff;
      padding:14px;border-radius:16px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);
      font-weight:900;
      display:flex;align-items:center;justify-content:center;
      min-height:58px;
    }
    .qbtn:active{transform:scale(.99)}

    .actions{
      margin-top:14px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .abtn{
      width:100%;
      padding:16px 14px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.04);
      color:#eaf2ff;
      font-weight:900;
      text-align:left;
      cursor:pointer;
      min-height:70px;
    }
    .abtn.primary{
      background:linear-gradient(90deg,#1b6bff,#0b2a59);
      border:none;
      text-align:center;
      box-shadow:0 18px 35px rgba(27,107,255,.22);
    }
    .abtn.danger{
      background:linear-gradient(90deg,#ff3b3b,#7a0a0a);
      border:none;
      text-align:center;
      box-shadow:0 18px 35px rgba(255,59,59,.18);
    }

    .muted{color:rgba(234,242,255,.68);font-size:12px;line-height:1.45;margin-top:8px}

    /* ===== Footer ===== */
    .footer{
      position:fixed;left:0;right:0;bottom:0;z-index:10;
      height:70px;background:#050b16;border-top:1px solid rgba(255,255,255,.08);
      display:flex;justify-content:space-around;align-items:center
    }
    .fitem{color:rgba(234,242,255,.85);text-decoration:none;font-size:12px;font-weight:900}
  </style>
</head>

<body>
  <div class="header">LOMASHARES</div>

  <div class="wrap">
    <div class="card">
      <!-- Profile Top Row -->
      <div class="profileRow">
        <div class="avatarBox">
          <div class="avatar" id="avatarText">LS</div>
        </div>

        <div class="infoBox">
          <p class="name" id="displayName">Loading...</p>
          <p class="email" id="displayEmail">Loading...</p>
        </div>
      </div>

      <!-- Balance -->
      <div class="balanceCard">
        <div class="balLabel">WALLET BALANCE</div>
        <div class="balValue" id="walletBalance">₦0</div>
        <div class="muted" id="walletHint">Fetching your wallet…</div>
      </div>

      <!-- Quick Links -->
      <div class="quick">
        <a class="qbtn" href="deposit.html">Deposit</a>
        <a class="qbtn" href="withdraw.html">Withdraw</a>
        <a class="qbtn" href="gift.html">Gift Code</a>
        <a class="qbtn" href="refer.html">Refer</a>
      </div>

      <!-- Actions -->
      <div class="actions">
        <button class="abtn" onclick="location.href='transactions.html'">Transaction History</button>
        <button class="abtn" onclick="location.href='deposit-history.html'">Deposit History</button>
        <button class="abtn" onclick="location.href='withdrawal-history.html'">Withdrawal History</button>
        <button class="abtn" onclick="window.open('https://t.me/YOUR_TELEGRAM_LINK', '_blank')">Join Telegram Group</button>
        <button class="abtn" onclick="window.open('https://chat.whatsapp.com/YOUR_WHATSAPP_LINK', '_blank')">Join WhatsApp Group</button>

        <button class="abtn danger" id="logoutBtn">Logout</button>
      </div>

      <div class="muted">
        Note: Your balance updates after successful Paystack verification.
      </div>
    </div>
  </div>

  <div class="footer">
    <a class="fitem" href="dashboard.html">Home</a>
    <a class="fitem" href="investment.html">Invest</a>
    <a class="fitem" href="team.html">Team</a>
    <a class="fitem" href="profile.html">Profile</a>
  </div>

<script>
  fetch("/api/wallet-balance", {
  method: "POST",
  headers: { "Content-Type": "application/json" },
  body: JSON.stringify({ email: JSON.parse(localStorage.getItem("authUser")).email })
})
.then(r => r.json())
.then(d => alert("Wallet API: " + JSON.stringify(d)))

  <script>
    // =====================================================
    // PROFILE PAGE (Works with NEW wallet table: wallets.balance)
    // Uses authUser stored in localStorage
    // Calls backend: /api/wallet-balance (you must create it)
    // =====================================================

    function getAuthUser() {
      const au = localStorage.getItem("authUser");
      if (!au) return null;
      try { return JSON.parse(au); } catch { return null; }
    }

    function emailToName(email) {
      if (!email) return "User";
      const parts = email.split("@");
      return parts[0] || "User";
    }

    function initialsFromEmail(email) {
      const name = emailToName(email);
      return (name[0] || "L").toUpperCase() + "S";
    }

    async function fetchWalletBalance(email) {
      // You need an API endpoint that returns wallet balance by email
      // We'll do POST to avoid caching issues
      const res = await fetch("/api/wallet-balance", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email })
      });
      return res.json();
    }

    function formatNaira(n) {
      const num = Number(n || 0);
      return "₦" + num.toLocaleString();
    }

    function logout() {
      localStorage.removeItem("authUser");
      window.location.href = "index.html";
    }

    document.addEventListener("DOMContentLoaded", async () => {
      const user = getAuthUser();
      if (!user || !user.email) {
        window.location.href = "index.html";
        return;
      }

      // UI fill
      const email = user.email;
      document.getElementById("displayEmail").textContent = email;
      document.getElementById("displayName").textContent = emailToName(email);
      document.getElementById("avatarText").textContent = initialsFromEmail(email);

      // Logout
      document.getElementById("logoutBtn").addEventListener("click", logout);

      // Wallet balance
      const hint = document.getElementById("walletHint");
      try {
        const data = await fetchWalletBalance(email);
        if (data.error) {
          hint.textContent = "Unable to fetch wallet: " + data.error;
          return;
        }
        document.getElementById("walletBalance").textContent = formatNaira(data.balance);
        hint.textContent = "Wallet fetched successfully.";
      } catch (e) {
        hint.textContent = "Network error while fetching wallet.";
      }
    });
  </script>
</body>
            </html>
